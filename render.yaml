services:
  - type: web
    name: keepiq-api
    env: python
    rootDir: backend
    buildCommand: pip install -e .[dev] && alembic upgrade head
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: APP_ENV
        value: production
      - key: TELEGRAM_USE_WEBHOOK
        value: "true"

  - type: worker
    name: keepiq-worker
    env: python
    rootDir: backend
    buildCommand: pip install -e .[dev]
    startCommand: python -m app.workers.run

  - type: web
    name: keepiq-bot-polling
    env: python
    rootDir: backend
    buildCommand: pip install -e .[dev]
    startCommand: python -m app.bot.run_polling
    autoDeploy: false
