<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>KeepiQ</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
      #boot-status {
        position: fixed;
        inset: 0;
        z-index: 9999;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 24px;
        background:
          radial-gradient(circle at top left, rgba(104, 143, 131, 0.24), transparent 32%),
          radial-gradient(circle at 85% 12%, rgba(193, 140, 118, 0.16), transparent 24%),
          radial-gradient(circle at 50% 100%, rgba(255, 255, 255, 0.38), transparent 36%),
          linear-gradient(160deg, #e8eef1 0%, #d6dee3 100%);
        color: #16212b;
        font-family: 'Manrope', system-ui, sans-serif;
      }

      #boot-status[hidden] {
        display: none;
      }

      .boot-card {
        width: min(100%, 420px);
        border: 1px solid rgba(22, 33, 43, 0.1);
        border-radius: 32px;
        background:
          linear-gradient(145deg, rgba(255, 255, 255, 0.6), rgba(255, 255, 255, 0.22)),
          rgba(252, 253, 255, 0.7);
        padding: 22px;
        box-shadow:
          0 24px 60px rgba(13, 20, 28, 0.14),
          inset 0 1px 0 rgba(255, 255, 255, 0.72);
        backdrop-filter: blur(22px) saturate(160%);
      }

      .boot-label {
        font-size: 12px;
        font-weight: 700;
        letter-spacing: 0.24em;
        text-transform: uppercase;
        color: #5e6d79;
      }

      .boot-title {
        margin: 10px 0 0;
        font-size: 32px;
        font-weight: 800;
        line-height: 1.05;
      }

      .boot-body {
        margin: 14px 0 0;
        font-size: 14px;
        line-height: 1.5;
        color: #5e6d79;
        white-space: pre-wrap;
        word-break: break-word;
      }
    </style>
    <script>
      (function () {
        const boot = {
          set(message) {
            const body = document.getElementById('boot-status-body');
            const node = document.getElementById('boot-status');
            if (body) body.textContent = message;
            if (node) node.hidden = false;
          },
          clear() {
            const node = document.getElementById('boot-status');
            if (node) node.hidden = true;
          },
        };
        window.__KEEPIQ_BOOT__ = boot;
        window.addEventListener('error', function (event) {
          const message = event && event.message ? event.message : 'Unknown frontend error';
          boot.set('Фронтенд упал до запуска приложения.\n' + message);
        });
        window.addEventListener('unhandledrejection', function (event) {
          const reason = event && event.reason ? String(event.reason) : 'Unknown promise rejection';
          boot.set('Необработанная ошибка во фронтенде.\n' + reason);
        });
      })();
    </script>
  </head>
  <body>
    <div id="boot-status">
      <div class="boot-card">
        <div class="boot-label">KeepiQ</div>
        <h1 class="boot-title">Загружаю KeepiQ</h1>
        <div class="boot-body" id="boot-status-body">Проверяю Mini App и поднимаю интерфейс.</div>
      </div>
    </div>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
